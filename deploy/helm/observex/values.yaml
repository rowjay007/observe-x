# Defaults assume an existing Postgres + ClickHouse + Redis cluster
# you point us at. Set these via `helm upgrade --set` or a values
# override file. Secrets (passwords, API keys) are pulled from
# pre-existing Kubernetes Secret objects via `existingSecret`.

global:
  imageRegistry: ghcr.io/rowjay007/observe-x
  imageTag: "1.0.0"
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  # ServiceMonitor support (kube-prometheus-stack); flip false if you
  # use a different scraping path.
  serviceMonitor:
    enabled: true
    namespace: ""  # empty ⇒ same as release namespace
    interval: 30s
    scrapeTimeout: 10s

# Existing secret should contain:
#   postgres-url       full DSN
#   clickhouse-pass    (optional)
#   admin-token        for tenant-api
#   pagerduty-key      (optional)
#   slack-webhook      (optional)
existingSecret: observex-config

clickhouse:
  addr: clickhouse.observex.svc.cluster.local:9000
  database: observex
  user: default

ingestGateway:
  enabled: true
  replicaCount: 3
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "4Gi" }
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""

queryEngine:
  enabled: true
  replicaCount: 2
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits:   { cpu: "1",    memory: "2Gi" }

tenantApi:
  enabled: true
  replicaCount: 2
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "500m", memory: "1Gi" }
  # OIDC for operator auth — ADR-0014. When enabled, the static
  # admin-token Secret key is NOT consumed; the validator gates
  # every /v1 admin route. Leave disabled in dev to fall back to
  # the break-glass token from `existingSecret.admin-token`.
  oidc:
    enabled: false
    issuer: ""           # e.g. https://login.example.com
    audience: observex
    adminGroups: []      # ["observex-admin"]
    groupClaim: ""       # default "groups"

alertManager:
  enabled: true
  replicaCount: 2
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "500m", memory: "1Gi" }

mlAnomalyDetector:
  enabled: true
  replicaCount: 1
  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1",    memory: "2Gi" }
  # ML model selection — ADR-0016. "" or "zscore" uses the default
  # in-process EWMA detector. "onnx" requires the operator to build
  # the image with `-tags onnx` and mount the model file.
  model: ""              # "", zscore, onnx
  modelPath: ""          # /models/iforest.onnx (onnx mode)
  modelInputName: ""     # default "float_input"
  modelScoreThreshold: "" # default 0.5

# UI server — ADR-0017. Single-binary operator console with an
# embedded vanilla-JS SPA.
uiServer:
  enabled: true
  replicaCount: 2
  resources:
    requests: { cpu: "50m",  memory: "64Mi" }
    limits:   { cpu: "250m", memory: "256Mi" }
  oidc:
    enabled: false
    issuer: ""
    audience: observex
    adminGroups: []
  ingress:
    enabled: false
    ingressClassName: ""
    host: observex.example.com
    annotations: {}
    tls: []

# Cold-tier controller — ADR-0015. Scrapes system.parts and surfaces
# per-(table, disk) gauges so operators can alarm on cold-tier moves
# that have stalled.
coldTier:
  enabled: true
  scrapeInterval: 60s
  resources:
    requests: { cpu: "20m",  memory: "32Mi" }
    limits:   { cpu: "100m", memory: "128Mi" }
  storagePolicyConfigMap:
    # When true, ship the canonical storage_policies.xml as a
    # ConfigMap so the operator can mount it on their ClickHouse
    # pods. Set false if the operator already manages CH config
    # via a separate chart.
    create: true

selfObservability:
  enabled: true
  endpoint: http://observex-ingest-gateway:7000
  samplingFraction: "0.10"
  insecure: "1"

# Audit-log export — ADR-0013. Disabled by default; opt-in by setting
# `backend: file | s3`. When s3 is selected, set `s3.bucket` and
# (optionally) `s3.lock: COMPLIANCE` for WORM retention.
auditLog:
  backend: ""        # "", "file", "s3"
  file:
    path: /var/log/observex/audit.ndjson
  s3:
    bucket: ""
    prefix: audit/
    region: ""
    endpoint: ""    # for MinIO / R2 / B2
    insecure: ""    # set to any non-empty value to use http://
    lock: ""        # "", GOVERNANCE, COMPLIANCE
    retain: 8760h   # 1y by default when lock is set

# Ports surfaced by the ingest gateway.
ports:
  httpIngest: 7000
  grpcOtlp: 4317
  statsd: 8125
  metrics: 7001
