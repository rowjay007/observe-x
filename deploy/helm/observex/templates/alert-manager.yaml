{{- if .Values.alertManager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observex.fullname" . }}-alert-manager
  labels:
    {{- include "observex.labels" . | nindent 4 }}
    app.kubernetes.io/component: alert-manager
spec:
  replicas: {{ .Values.alertManager.replicaCount }}
  selector:
    matchLabels:
      {{- include "observex.selectorLabels" (dict "ctx" . "component" "alert-manager") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "observex.selectorLabels" (dict "ctx" . "component" "alert-manager") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: alert-manager
          image: {{ include "observex.image" (dict "Values" .Values "component" "alert-manager") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - { name: http, containerPort: 7700 }
          env:
            - name: OBSERVE_X_SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef: { name: {{ .Values.existingSecret }}, key: slack-webhook, optional: true }
            - name: OBSERVE_X_PAGERDUTY_INTEGRATION_KEY
              valueFrom:
                secretKeyRef: { name: {{ .Values.existingSecret }}, key: pagerduty-key, optional: true }
            {{- include "observex.commonEnv" . | nindent 12 }}
          readinessProbe:
            httpGet: { path: /ready, port: http }
          livenessProbe:
            httpGet: { path: /health, port: http }
          resources:
            {{- toYaml .Values.alertManager.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observex.fullname" . }}-alert-manager
  labels:
    {{- include "observex.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "observex.selectorLabels" (dict "ctx" . "component" "alert-manager") | nindent 4 }}
  ports:
    - { name: http, port: 7700, targetPort: http }
{{- if .Values.global.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "observex.fullname" . }}-alert-manager
  labels:
    {{- include "observex.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "observex.selectorLabels" (dict "ctx" . "component" "alert-manager") | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.global.serviceMonitor.interval }}
{{- end }}
{{- end }}
