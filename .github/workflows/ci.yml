name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

# A single concurrency group per PR / branch so a fresh push cancels
# the previous run instead of queueing two full pipelines.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────
  # Lint
  #
  # Pinned to golangci-lint v2.x because v1.x is built with Go 1.23
  # and refuses to load a config that targets Go 1.24+ (our go.mod is
  # 1.25). The action major v7 is the first one that understands the
  # v2 config schema.
  # ───────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: golangci-lint
        # v2.12.2 is the first release whose pre-built binary is
        # compiled with Go ≥ 1.25, which our go.mod targets. Older
        # releases (incl. all v1.x and early v2.x) fail at config
        # load with "the Go language version used to build
        # golangci-lint is lower than the targeted Go version".
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  # ───────────────────────────────────────────────────────────────────
  # Vulnerability scan
  # ───────────────────────────────────────────────────────────────────
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ───────────────────────────────────────────────────────────────────
  # Unit tests
  #
  # Deliberately runs WITHOUT any service containers. The integration
  # tests that need ClickHouse / Postgres / Redis are tagged
  # `integration` and live in `tests/integration` — every other test
  # in the tree either mocks or skips cleanly when env vars are absent.
  # Keeping the unit-test job docker-free means a Docker Hub blip
  # never gates a PR.
  # ───────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: unit tests (race)
        run: go test -race -count=1 -timeout=240s -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  # ───────────────────────────────────────────────────────────────────
  # Integration tests
  #
  # Spins up ClickHouse + Postgres + Redis as service containers and
  # runs the `-tags=integration` suite. Marked continue-on-error so a
  # transient Docker Hub timeout (the "context deadline exceeded"
  # class of failure that hit us repeatedly) doesn't block a PR. We
  # also authenticate to Docker Hub when secrets are available so we
  # use the per-user rate limit instead of the anonymous one.
  #
  # The job's exit status is still surfaced in the PR checks; it just
  # isn't a required check. To make it required, drop continue-on-error.
  # ───────────────────────────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24-alpine
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: observex
          POSTGRES_PASSWORD: observex
          POSTGRES_DB: observex
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      OBSERVE_X_CLICKHOUSE_ADDR: localhost:9000
      OBSERVE_X_CLICKHOUSE_DB: observex
      OBSERVE_X_POSTGRES_URL: postgres://observex:observex@localhost:5432/observex?sslmode=disable
      OBSERVE_X_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      # Authenticate to Docker Hub when credentials are configured.
      # Without secrets the step is a no-op and we fall back to the
      # anonymous rate limit (100 pulls / 6h per IP), which is what
      # caused the "context deadline exceeded" failures.
      - name: Docker Hub login (optional)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: integration tests (race, tagged)
        run: go test -race -count=1 -timeout=180s -tags=integration ./tests/integration/...

  # ───────────────────────────────────────────────────────────────────
  # Build + UI smoke
  # ───────────────────────────────────────────────────────────────────
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Build ingest-gateway
        run: go build -trimpath -o bin/ingest-gateway ./services/ingest-gateway/cmd
      - name: Build tenant-api
        run: go build -trimpath -o bin/tenant-api ./services/tenant-api/cmd
      - name: Build query-engine
        run: go build -trimpath -o bin/query-engine ./services/query-engine/cmd
      - name: Build ml-anomaly-detector
        run: go build -trimpath -o bin/ml-anomaly-detector ./services/ml-anomaly-detector/cmd
      - name: Build alert-manager
        run: go build -trimpath -o bin/alert-manager ./services/alert-manager/cmd
      - name: Build cold-tier-controller (C-3b)
        run: go build -trimpath -o bin/cold-tier ./services/cold-tier/cmd
      - name: Build ui-server (C-4)
        run: go build -trimpath -o bin/ui-server ./services/ui-server/cmd
      - name: Smoke-test embedded UI assets
        run: |
          # The UI ships its SPA as go:embed assets; if the embed
          # set drifts (assets/* removed, asset renamed, glob broken)
          # the binary still compiles but the SPA returns 404. We
          # boot the binary on a high port, scrape /, and assert the
          # response is HTML containing the brand string. This is a
          # 5-second guard against an entire class of "we shipped a
          # blank operator console" regressions.
          ./bin/ui-server &
          UI_PID=$!
          sleep 2
          set -e
          BODY="$(curl -sf http://localhost:8080/)"
          echo "$BODY" | grep -q '<title>ObserveX</title>' || (echo "SPA index missing brand" && exit 1)
          curl -sf http://localhost:8080/app.js  > /dev/null
          curl -sf http://localhost:8080/app.css > /dev/null
          curl -sf http://localhost:8080/healthz > /dev/null
          kill $UI_PID
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────
  # Helm + ArgoCD manifest validation
  # ───────────────────────────────────────────────────────────────────
  helm:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.1
      - name: helm lint
        run: helm lint deploy/helm/observex
      - name: helm template (default values)
        run: helm template observex deploy/helm/observex > /tmp/rendered.yaml
      - name: helm template (audit-log s3 + WORM)
        run: |
          helm template observex deploy/helm/observex \
            --set auditLog.backend=s3 \
            --set auditLog.s3.bucket=test-bucket \
            --set auditLog.s3.lock=COMPLIANCE \
            > /tmp/rendered-audit.yaml
      - name: helm template (Phase C-3b + C-4 full)
        run: |
          # Renders the chart with every new value path enabled so a
          # missing nindent or undefined value blows up here, not at
          # the operator's `helm upgrade`.
          helm template observex deploy/helm/observex \
            --set uiServer.enabled=true \
            --set uiServer.ingress.enabled=true \
            --set uiServer.ingress.host=ui.example.com \
            --set coldTier.enabled=true \
            --set tenantApi.oidc.enabled=true \
            --set tenantApi.oidc.issuer=https://login.example.com \
            --set tenantApi.oidc.adminGroups='{sre,observex-admin}' \
            --set uiServer.oidc.enabled=true \
            --set uiServer.oidc.issuer=https://login.example.com \
            > /tmp/rendered-full.yaml
          grep -q "OBSERVE_X_OIDC_ISSUER" /tmp/rendered-full.yaml
          grep -q "cold-tier" /tmp/rendered-full.yaml
          grep -q "ui-server" /tmp/rendered-full.yaml
          # Admin token MUST be absent when OIDC is enabled.
          ! grep -q "OBSERVE_X_TENANT_API_ADMIN_TOKEN" /tmp/rendered-full.yaml
      - name: helm template (Phase E-0 Grafana provisioning)
        run: |
          # Asserts the three ConfigMaps that ship the visualization
          # stack (ADR-0028) render cleanly AND embed all four
          # dashboard JSON payloads (1 platform + 3 tenant).
          helm template observex deploy/helm/observex > /tmp/rendered-viz.yaml
          grep -q "name: observex-grafana-datasources" /tmp/rendered-viz.yaml
          grep -q "name: observex-grafana-provider"    /tmp/rendered-viz.yaml
          grep -q "name: observex-grafana-dashboards"  /tmp/rendered-viz.yaml
          grep -q "observex-overview.json"             /tmp/rendered-viz.yaml
          grep -q "tenant-metrics.json"                /tmp/rendered-viz.yaml
          grep -q "tenant-logs.json"                   /tmp/rendered-viz.yaml
          grep -q "tenant-traces.json"                 /tmp/rendered-viz.yaml
          # Opt-out path should produce ZERO grafana CMs.
          helm template observex deploy/helm/observex \
            --set grafana.provisioning.create=false \
            > /tmp/rendered-noviz.yaml
          ! grep -q "name: observex-grafana-" /tmp/rendered-noviz.yaml
      - name: Validate dashboard JSON
        run: |
          # Each dashboard must be valid JSON. A typo here would slip
          # past helm template (it just embeds raw text) but break at
          # Grafana load time, so we parse on the runner.
          for f in deploy/grafana/dashboards/**/*.json; do
            python3 -c "import json,sys; json.load(open('$f'))" \
              || (echo "Invalid JSON: $f" && exit 1)
          done
      - name: kubeval rendered manifests
        uses: instrumenta/kubeval-action@master
        continue-on-error: true
        with:
          files: /tmp/rendered.yaml
      - name: ArgoCD manifests structural check
        run: |
          # Lightweight schema check — fail fast on YAML syntax / kind
          # mismatches before the operator deploys to a real cluster.
          python3 -c "import yaml, sys, glob
          for f in sorted(glob.glob('deploy/argocd/*.yaml')):
              with open(f) as fh:
                  for doc in yaml.safe_load_all(fh):
                      assert doc is not None, f
                      assert doc.get('apiVersion','').startswith('argoproj.io/'), f
                      assert doc.get('kind') in ('Application','AppProject'), f
                      print(f, '→', doc['kind'])"

  # ───────────────────────────────────────────────────────────────────
  # Heavy throughput validation — workflow_dispatch / nightly only.
  # ───────────────────────────────────────────────────────────────────
  perf:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: WAL throughput benchmark
        run: |
          go test -bench=BenchmarkEstimateThroughput -benchmem \
            -count=3 ./tests/benchmarks/... | tee bench.txt
      - name: Upload bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench
          path: bench.txt
