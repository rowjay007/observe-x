name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24-alpine
        ports:
          - 8123:8123
          - 9000:9000
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: observex
          POSTGRES_PASSWORD: observex
          POSTGRES_DB: observex
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      OBSERVE_X_CLICKHOUSE_ADDR: localhost:9000
      OBSERVE_X_CLICKHOUSE_DB: observex
      OBSERVE_X_POSTGRES_URL: postgres://observex:observex@localhost:5432/observex?sslmode=disable
      OBSERVE_X_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: unit tests (race)
        run: go test -race -count=1 -timeout=240s -coverprofile=coverage.out ./...
      - name: integration tests (race, tagged)
        run: go test -race -count=1 -timeout=180s -tags=integration ./tests/integration/...
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Build ingest-gateway
        run: go build -trimpath -o bin/ingest-gateway ./services/ingest-gateway/cmd
      - name: Build tenant-api
        run: go build -trimpath -o bin/tenant-api ./services/tenant-api/cmd
      - name: Build query-engine
        run: go build -trimpath -o bin/query-engine ./services/query-engine/cmd
      - name: Build ml-anomaly-detector
        run: go build -trimpath -o bin/ml-anomaly-detector ./services/ml-anomaly-detector/cmd
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  # Heavy throughput validation runs on demand via workflow_dispatch or
  # nightly schedule — not on every PR (k6 spins up Docker services and
  # takes a few minutes). The minimum SLO gate is enforced by the
  # in-package BenchmarkEstimateThroughput which the test job already
  # exercises.
  perf:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: WAL throughput benchmark
        run: |
          go test -bench=BenchmarkEstimateThroughput -benchmem \
            -count=3 ./tests/benchmarks/... | tee bench.txt
      - name: Upload bench results
        uses: actions/upload-artifact@v4
        with:
          name: bench
          path: bench.txt
