# golangci-lint v2 configuration.
#
# Why v2: golangci-lint v1.x is built with Go 1.23 and refuses to load
# a config targeted at Go 1.24+ (our go.mod is 1.25). v2.x is rebuilt
# against the current toolchain.
#
# Linter selection rationale:
#   * staticcheck / govet / unused — correctness, always on.
#   * errcheck — on, with a curated allowlist for the well-known
#     "fire-and-forget" idioms (defer rows.Close, hash.Write, etc.).
#   * gosec — on, with explicit excludes for the rules we audit by
#     hand (each with a code-level comment justifying why).
#   * revive — we keep `var-naming` and `package-comments` (both
#     genuinely catch bad style) and explicitly drop `exported`. The
#     codebase has thorough package- and type-level doc strings; the
#     "every exported func needs a one-line comment" rule produces
#     fifty mechanical false positives without improving readability.
#   * ineffassign — on, cheap.
#   * misspell — on, cheap.

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive

  settings:
    errcheck:
      # Idioms where the error return is intentionally ignored.
      # Each entry is documented at the call site too.
      exclude-functions:
        # `defer rows.Close()` / `defer resp.Body.Close()` — the
        # caller has already handled the meaningful error from the
        # query/HTTP call; the Close error is duplicative.
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*net/http.Response.Body).Close
        # hash.Hash.Write never returns an error per its contract.
        - (hash.Hash).Write
        # json.Encoder.Encode failures here go to a response writer
        # where the headers are already flushed — nothing to do.
        - (*encoding/json.Encoder).Encode
        # fmt.Fprintf to a bytes/strings buffer never errors.
        - fmt.Fprintf

    gosec:
      excludes:
        # G115: integer overflow conversion — audited per call site.
        - G115
        # G118: long-lived background goroutines (audit-log flusher,
        # JWKS refresh, last-used updater) intentionally use
        # context.Background; tying them to a request-scoped ctx
        # would terminate them on every request.
        - G118
        # G301/G302: world-readable dir/file permissions — every WAL
        # / audit file path is fed by trusted operator config; the
        # mode is exactly what we want for shared service users.
        - G301
        - G302
        # G304: file path is variable — yes, the operator configures
        # WAL / audit / model paths via env; we validate upstream.
        - G304
        # G404: math/rand for jitter — not a security context.
        - G404

    revive:
      rules:
        - name: var-naming
        # NOTE: `exported` and `package-comments` are intentionally
        # omitted. The codebase has thorough type-level and package-
        # level doc strings already; the rules misfire on per-file
        # package comments (we deliberately keep multiple "this file"
        # narratives across e.g. pkg/auth/auth.go + scopes.go).

  exclusions:
    # Embedded SQL migrations and generated protobuf folders are not
    # idiomatic Go and trip every style linter.
    paths:
      - pkg/storage/clickhouse/migrations
      - ".*\\.pb\\.go$"
      - ".*_gen\\.go$"
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      # The hand-rolled gRPC receiver mirrors protoc-gen-go's
      # ServiceDesc naming convention (capital underscores) so
      # client codegen and tooling see the standard shape.
      - path: services/ingest-gateway/internal/receiver/grpc_receiver\.go
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
